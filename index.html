<!-- Carousel -->
<div class="carousel">
  <img class="active" src="images/Bigblock.jpg" alt="Bigblock">
  <img src="images/Naturalledge.jpg" alt="Naturalledge">
  <img src="images/Sunset1.jpg" alt="Sunset1">
</div>

<script>
let images = document.querySelectorAll(".carousel img");
let index = 0;

setInterval(() => {
  images[index].classList.remove("active");
  index = (index + 1) % images.length;
  images[index].classList.add("active");
}, 5000);
</script>
